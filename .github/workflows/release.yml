name: OSS Draft Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify-tag:
    name: Verify Release Version
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      version: ${{ steps.version.outputs.version }}
      artifact_prefix: ${{ steps.version.outputs.artifact_prefix }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Verify release version
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" = "push" ]; then
            VERSION="$(node scripts/release/verify-release-tag.mjs --tag "$GITHUB_REF_NAME")"
          else
            VERSION="$(node -p "require('./apps/desktop/package.json').version")"
          fi
          ARTIFACT_PREFIX="$(node -p "require('./apps/desktop/package.json').productName.replace(/\\s+/g, '')")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "artifact_prefix=$ARTIFACT_PREFIX" >> "$GITHUB_OUTPUT"

  gate:
    needs: verify-tag
    uses: ./.github/workflows/oss-release-gate.yml

  ci:
    needs:
      - verify-tag
      - gate
    uses: ./.github/workflows/ci.yml

  native:
    needs:
      - verify-tag
      - gate
      - ci
    permissions:
      contents: read
      pull-requests: read
    uses: ./.github/workflows/native-builds.yml

  assemble:
    name: Assemble Release Assets
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs:
      - verify-tag
      - gate
      - ci
      - native
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 22.12.0

      - name: Download macOS arm64 artifact
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3
        with:
          name: native-macos-arm64
          path: build/release-downloads/native-macos-arm64

      - name: Download macOS x64 artifact
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3
        with:
          name: native-macos-x64
          path: build/release-downloads/native-macos-x64

      - name: Download Windows x64 artifacts
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3
        with:
          name: native-windows-x64
          path: build/release-downloads/native-windows-x64

      - name: Download Android artifacts
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3
        with:
          name: native-android
          path: build/release-downloads/native-android

      - name: Assemble release assets
        env:
          VERSION: ${{ needs.verify-tag.outputs.version }}
        run: >-
          pnpm assemble:release-assets --
          --version "$VERSION"
          --input-dir build/release-downloads/native-macos-arm64
          --input-dir build/release-downloads/native-macos-x64
          --input-dir build/release-downloads/native-windows-x64
          --input-dir build/release-downloads/native-android
          --output-dir build/release-assets

      - name: Upload assembled release assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: oss-release-assets-${{ needs.verify-tag.outputs.version }}
          path: build/release-assets
          if-no-files-found: error
          retention-days: 7
          overwrite: true

  release:
    name: Update Draft Release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs:
      - verify-tag
      - assemble
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Download assembled release assets
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3
        with:
          name: oss-release-assets-${{ needs.verify-tag.outputs.version }}
          path: build/release-assets

      - name: Create or update draft release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
          VERSION: ${{ needs.verify-tag.outputs.version }}
          ARTIFACT_PREFIX: ${{ needs.verify-tag.outputs.artifact_prefix }}
        run: |
          set -euo pipefail

          cat > "$RUNNER_TEMP/release-body.md" <<'EOF'
          These files are unsigned OSS build-verification outputs, not an official signed
          distribution. macOS Gatekeeper, Windows SmartScreen, and Android sideloading
          controls may block installation or display warnings. Verify the matching entry
          in `SHA256SUMS` before testing an asset.
          EOF

          if RELEASE_JSON="$(gh release view "$TAG" --json isDraft 2>/dev/null)"; then
            if [ "$(jq -r '.isDraft' <<< "$RELEASE_JSON")" != "true" ]; then
              echo "Refusing to overwrite published release $TAG." >&2
              exit 1
            fi
          else
            gh release create "$TAG" \
              --draft \
              --generate-notes \
              --notes-file "$RUNNER_TEMP/release-body.md" \
              --title "Lynavo Drive $TAG" \
              --verify-tag
          fi

          ASSETS=(
            "${ARTIFACT_PREFIX}-${VERSION}-macos-arm64.dmg"
            "${ARTIFACT_PREFIX}-${VERSION}-macos-x64.dmg"
            "${ARTIFACT_PREFIX}-${VERSION}-windows-x64.exe"
            "${ARTIFACT_PREFIX}-${VERSION}-windows-x64.zip"
            "${ARTIFACT_PREFIX}-${VERSION}-android-arm64-x86_64.apk"
            "${ARTIFACT_PREFIX}-${VERSION}-android-arm64-x86_64.aab"
            "SHA256SUMS"
          )

          ASSET_PATHS=()
          for asset in "${ASSETS[@]}"; do
            ASSET_PATHS+=("build/release-assets/$asset")
          done

          RELEASE_JSON="$(gh release view "$TAG" --json isDraft)"
          if [ "$(jq -r '.isDraft' <<< "$RELEASE_JSON")" != "true" ]; then
            echo "Refusing to overwrite published release $TAG." >&2
            exit 1
          fi
          gh release upload "$TAG" "${ASSET_PATHS[@]}" --clobber
