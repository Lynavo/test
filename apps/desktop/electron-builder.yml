appId: com.lynavo.drive.desktop.demo
productName: LynavoDriveDemo
buildVersion: '62'
files:
  - out/**/*
  - node_modules/**/*
  - package.json
mac:
  artifactName: LynavoDriveDemo-${version}-${arch}.${ext}
  identity: null
  target:
    - dmg
    - zip
  category: public.app-category.utilities
  icon: resources/icon.icns
  extendInfo:
    NSDesktopFolderUsageDescription: LynavoDriveDemo needs access to the Desktop folder to sync, store, and open media.
    NSDocumentsFolderUsageDescription: LynavoDriveDemo needs access to the Documents folder to sync, store, and open media.
    NSDownloadsFolderUsageDescription: LynavoDriveDemo needs access to the Downloads folder to sync, store, and open media.
  binaries:
    - Contents/Resources/lynavo-drive-sidecar
  extraResources:
    - from: resources/lynavo-drive-sidecar
      to: lynavo-drive-sidecar
dmg:
  backgroundColor: '#f5f7fb'
  iconSize: 128
  window:
    width: 540
    height: 380
  contents:
    - x: 150
      y: 210
      type: file
    - x: 390
      y: 210
      type: link
      path: /Applications
win:
  artifactName: LynavoDriveDemo-${version}-${arch}.${ext}
  forceCodeSigning: false
  verifyUpdateCodeSignature: false
  signExts:
    - '!.exe'
  target:
    - target: nsis
      arch:
        - x64
    - target: zip
      arch:
        - x64
  executableName: LynavoDriveDemo
  extraResources:
    - from: resources
      filter:
        - lynavo-drive-sidecar.exe
linux:
  artifactName: LynavoDriveDemo-${version}-linux-${arch}.${ext}
  maintainer: Lynavo Drive Maintainers <maintainers@lynavo.invalid>
  target:
    - target: deb
      arch:
        - x64
        - arm64
  category: Utility
  executableName: lynavo-drive-demo
  icon: resources/icon-1024.png
  extraResources:
    - from: resources/lynavo-drive-sidecar
      to: lynavo-drive-sidecar
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: LynavoDriveDemo
  include: resources/installer.nsh
directories:
  output: release
  buildResources: resources
