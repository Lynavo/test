appId: com.lynavo.drive.desktop
productName: Lynavo Drive
buildVersion: '62'
mac:
  artifactName: LynavoDrive-${version}-${arch}.${ext}
  target:
    - dmg
    - zip
    - mas
  category: public.app-category.utilities
  icon: resources/icon.icns
  sign: ./scripts/mac-sign.cjs
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.inherit.plist
  extendInfo:
    NSDesktopFolderUsageDescription: Lynavo Drive 需要存取桌面資料夾，用於同步、儲存與開啟素材。
    NSDocumentsFolderUsageDescription: Lynavo Drive 需要存取文件資料夾，用於同步、儲存與開啟素材。
    NSDownloadsFolderUsageDescription: Lynavo Drive 需要存取下載資料夾，用於同步、儲存與開啟素材。
  binaries:
    - Contents/Resources/lynavo-drive-sidecar
  extraResources:
    - from: resources/lynavo-drive-sidecar
      to: lynavo-drive-sidecar
dmg:
  backgroundColor: '#f5f7fb'
  iconSize: 128
  window:
    width: 540
    height: 380
  contents:
    - x: 150
      y: 210
      type: file
    - x: 390
      y: 210
      type: link
      path: /Applications
mas:
  extendInfo:
    ITSAppUsesNonExemptEncryption: false
    NSDesktopFolderUsageDescription: Lynavo Drive 需要存取桌面資料夾，用於同步、儲存與開啟素材。
    NSDocumentsFolderUsageDescription: Lynavo Drive 需要存取文件資料夾，用於同步、儲存與開啟素材。
    NSDownloadsFolderUsageDescription: Lynavo Drive 需要存取下載資料夾，用於同步、儲存與開啟素材。
  entitlements: resources/entitlements.mas.plist
  entitlementsInherit: resources/entitlements.mas.inherit.plist
  provisioningProfile: resources/embedded.provisionprofile
  notarize: null
win:
  artifactName: LynavoDrive-${version}-${arch}.${ext}
  target:
    - target: nsis
      arch:
        - x64
    - target: zip
      arch:
        - x64
  executableName: Lynavo Drive
  extraResources:
    - from: resources
      filter:
        - lynavo-drive-sidecar.exe
        - dns-sd.exe
        - dnssd.dll
linux:
  artifactName: LynavoDrive-${version}-linux-${arch}.${ext}
  target:
    - target: deb
      arch:
        - x64
        - arm64
  category: Utility
  executableName: lynavo-drive
  icon: resources/icon-1024.png
  extraResources:
    - from: resources/lynavo-drive-sidecar
      to: lynavo-drive-sidecar
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: Lynavo Drive
  include: resources/installer.nsh
directories:
  output: release
  buildResources: resources
