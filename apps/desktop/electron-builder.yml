appId: com.vividrop.desktop.china
productName: Vivi Drop
buildVersion: "61"
mac:
  artifactName: ViviDrop-${version}-${arch}.${ext}
  target:
    - dmg
    - zip
    - mas
  category: public.app-category.utilities
  icon: resources/icon.icns
  sign: ./scripts/mac-sign.cjs
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.inherit.plist
  extendInfo:
    NSDesktopFolderUsageDescription: Vivi Drop 需要存取桌面資料夾，用於同步、儲存與開啟素材。
    NSDocumentsFolderUsageDescription: Vivi Drop 需要存取文件資料夾，用於同步、儲存與開啟素材。
    NSDownloadsFolderUsageDescription: Vivi Drop 需要存取下載資料夾，用於同步、儲存與開啟素材。
  binaries:
    - Contents/Resources/syncflow-sidecar
  extraResources:
    - from: resources/syncflow-sidecar
      to: syncflow-sidecar
dmg:
  backgroundColor: '#f5f7fb'
  iconSize: 128
  window:
    width: 540
    height: 380
  contents:
    - x: 150
      y: 210
      type: file
    - x: 390
      y: 210
      type: link
      path: /Applications
mas:
  extendInfo:
    ITSAppUsesNonExemptEncryption: false
    NSDesktopFolderUsageDescription: Vivi Drop 需要存取桌面資料夾，用於同步、儲存與開啟素材。
    NSDocumentsFolderUsageDescription: Vivi Drop 需要存取文件資料夾，用於同步、儲存與開啟素材。
    NSDownloadsFolderUsageDescription: Vivi Drop 需要存取下載資料夾，用於同步、儲存與開啟素材。
  entitlements: resources/entitlements.mas.plist
  entitlementsInherit: resources/entitlements.mas.inherit.plist
  provisioningProfile: resources/embedded.provisionprofile
  notarize: null
win:
  artifactName: ViviDrop-${version}-${arch}.${ext}
  target:
    - target: nsis
      arch:
        - x64
    - target: zip
      arch:
        - x64
  executableName: Vivi Drop
  extraResources:
    - from: resources
      filter:
        - syncflow-sidecar.exe
        - dns-sd.exe
        - dnssd.dll
linux:
  artifactName: ViviDrop-${version}-linux-${arch}.${ext}
  target:
    - target: deb
      arch:
        - x64
        - arm64
  category: Utility
  executableName: vivi-drop
  icon: resources/icon-1024.png
  extraResources:
    - from: resources/syncflow-sidecar
      to: syncflow-sidecar
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: Vivi Drop
  include: resources/installer.nsh
directories:
  output: release
  buildResources: resources
